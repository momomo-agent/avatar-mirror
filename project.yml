name: AvatarMirror
options:
  bundleIdPrefix: com.momomo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  AvatarMirror:
    type: application
    platform: iOS
    sources:
      - AvatarMirror
    settings:
      base:
        INFOPLIST_FILE: AvatarMirror/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.momomo.avatar-mirror
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: P2GN9QW8E5
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
    dependencies:
      - package: HumanSenseKit
      - package: AvatarKit
    entitlements:
      path: AvatarMirror/AvatarMirror.entitlements
      properties:
        com.apple.security.app-sandbox: true

packages:
  HumanSenseKit:
    url: https://github.com/momomo-agent/HumanSenseKit.git
    from: "1.2.0"
  AvatarKit:
    url: https://github.com/momomo-agent/AvatarKit.git
    from: "0.2.0"
