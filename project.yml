name: AvatarMirror
options:
  bundleIdPrefix: com.momomo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  AvatarMirror:
    type: application
    platform: iOS
    sources:
      - path: AvatarMirror
        excludes:
          - "Resources/AudioSamples/**"
      - path: AvatarMirror/Resources/AudioSamples
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: AvatarMirror/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.momomo.avatar-mirror
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: P2GN9QW8E5
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        CREATE_INFOPLIST_SECTION_IN_BINARY: YES
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_STYLE: Automatic
          ENABLE_CODE_SIGNING: YES
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
          CODE_SIGN_STYLE: Automatic
          ENABLE_CODE_SIGNING: YES
    dependencies:
      - package: HumanSenseKit
      - package: AvatarKit

packages:
  HumanSenseKit:
    url: https://github.com/momomo-agent/HumanSenseKit.git
    from: "1.2.0"
  AvatarKit:
    url: https://github.com/momomo-agent/AvatarKit.git
    branch: main
    branch: main
